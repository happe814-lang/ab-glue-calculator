<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AB膠計算機</title>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --range-text: #d48806; 
            --machine-bg: #e6f7ff; --danger-bg: #fff1f0; --danger-border: #ffa39e; 
            --warn-bg: #fffbe6; --warn-border: #ffe58f; --ok-bg: #f6ffed; --ok-border: #b7eb8f;
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; width: 100%; background: #eef2f5; position: fixed; }
        body { font-family: -apple-system, sans-serif; }
        
        .app-card { 
            background: white; width: 92%; max-width: 400px; border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; 
            margin: 10px auto; display: flex; flex-direction: column;
        }
        
        .home-menu { display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { 
            padding: 25px 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .btn-hand-big { background: #fffbe6; color: #d48806; border: 1.5px solid #ffe58f; }
        .btn-machine-big { background: #e6f7ff; color: #0050b3; border: 1.5px solid #91d5ff; }

        .header { display: flex; align-items: center; margin-bottom: 10px; position: relative; height: 35px; }
        .btn-back { position: absolute; left: 0; background: #eee; border: none; padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; }
        h2 { flex: 1; text-align: center; color: var(--primary); font-size: 0.95rem; margin: 0; }

        .glue-selector { display: flex; gap: 5px; margin-bottom: 10px; }
        .glue-opt { 
            flex: 1; border: 1.5px solid #eee; padding: 8px 0; border-radius: 8px; 
            background: white; text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: #888;
        }
        .glue-opt.active { border-color: var(--accent); background: #f0f7ff; color: var(--accent); }

        .input-group { margin-bottom: 10px; position: relative; }
        label { display: block; margin-bottom: 3px; font-weight: bold; color: #555; font-size: 0.8rem; }
        input { 
            width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; 
            font-size: 1.4rem; font-weight: bold; box-sizing: border-box; text-align: center; outline: none;
            background: #fff; cursor: pointer;
        }
        input.active-focus { border-color: var(--accent); background: #f0f7ff !important; }

        .btn-reset-inline {
            position: absolute; right: 0; top: 0; background: #f0f0f0; 
            border: 1px solid #ccc; color: #666; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem;
        }

        .result-box { border-radius: 14px; padding: 8px; text-align: center; margin-bottom: 5px; border: 1.5px solid transparent; }
        .res-hand-total { background: #f8f9fa; border-color: #eee; }
        .res-machine { background: var(--machine-bg); border-color: #91d5ff; }
        .res-machine.status-danger { background: var(--danger-bg); border-color: var(--danger-border); }
        .res-machine.status-warn { background: var(--warn-bg); border-color: var(--warn-border); }
        .res-machine.status-ok { background: var(--ok-bg); border-color: var(--ok-border); }

        .res-label { font-size: 0.8rem; color: #666; font-weight: bold; }
        .res-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .res-range-value { font-size: 0.9rem; font-weight: bold; margin-top: 1px; }

        .model-list-container { 
            background: #f8f9fa; border-radius: 10px; padding: 8px; border: 1px solid #eee; 
            font-size: 0.7rem; overflow-y: auto; max-height: 80px; 
        }
        .tag-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .tag { background: #fff; border: 1px solid #ddd; padding: 1px 4px; border-radius: 3px; color: #444; }
        
        .hidden { display: none !important; }

        /* 鍵盤高度縮減一半的核心設定 */
        #customKb {
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #d1d4d9; padding: 5px 5px 15px 5px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.2);
            z-index: 9999; transition: transform 0.2s ease-out;
            transform: translateY(105%);
        }
        #customKb.show { transform: translateY(0); }
        .kb-btn {
            background: #fff; border: none; 
            padding: 10px 0; /* 縮減按鈕高度 */
            border-radius: 6px;
            font-size: 1.3rem; font-weight: bold; color: #000;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2); cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            touch-action: manipulation;
        }
        .kb-btn:active { background: #bdc3c7; transform: translateY(1px); }
        .kb-btn.action { background: #acb1b9; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div class="app-card">
    <div id="homePage" class="home-menu">
        <h2 style="margin-bottom: 5px;">選擇作業模式</h2>
        <button class="nav-btn btn-hand-big" onclick="openHandMode(event)">🖐️ 手調模式</button>
        <button class="nav-btn btn-machine-big" onclick="openMachineMode(event)">⚙️ 打膠機校正</button>
    </div>

    <div id="handPage" class="hidden">
        <div class="header">
            <button class="btn-back" onclick="goBack(event)">⬅ 返回</button>
            <h2>手調計算</h2>
        </div>
        <div class="glue-selector">
            <div class="glue-opt" onclick="setHandType(0, event)">17+18</div>
            <div class="glue-opt" onclick="setHandType(1, event)">31+32</div>
            <div class="glue-opt" onclick="setHandType(2, event)">35+36</div>
        </div>
        <div class="input-group">
            <label id="handLabelA">主劑重量 (g)</label>
            <button class="btn-reset-inline" onclick="resetHand()">清空</button>
            <input type="text" id="handInputA" placeholder="點擊輸入" readonly onclick="showKb(this, event)">
        </div>
        <div class="result-box res-hand-total">
            <div class="res-label">預估混合總重 (A+B)</div>
            <div id="handTotal" class="res-value">--- g</div>
            <div id="handTotalRange" class="res-range-value" style="color: var(--range-text)">--- ~ ---</div>
        </div>
        <div class="model-list-container"><div id="handTags" class="tag-container"></div></div>
    </div>

    <div id="machinePage" class="hidden">
        <div class="header">
            <button class="btn-back" onclick="goBack(event)">⬅ 返回</button>
            <h2>打膠機校正</h2>
        </div>
        <div class="input-group">
            <label>主劑 (GLU-0035) (g)</label>
            <button class="btn-reset-inline" onclick="resetMach()">清空</button>
            <input type="text" id="machInputA" placeholder="輸入主劑" readonly onclick="showKb(this, event)">
        </div>
        <div class="input-group">
            <label>硬化劑 (GLU-0036) (g)</label>
            <input type="text" id="machInputB" placeholder="輸入硬化劑" readonly onclick="showKb(this, event)">
        </div>
        <div id="machBox" class="result-box res-machine">
            <div class="res-label">實測重量比 (B ÷ A)</div>
            <div id="machRatio" class="res-value">---</div>
            <div id="machStatus" class="res-range-value">請輸入數值</div>
        </div>
    </div>
</div>

<div id="customKb" onclick="event.stopPropagation()">
    <div class="kb-btn" onclick="kbInput('1')">1</div>
    <div class="kb-btn" onclick="kbInput('2')">2</div>
    <div class="kb-btn" onclick="kbInput('3')">3</div>
    <div class="kb-btn" onclick="kbInput('4')">4</div>
    <div class="kb-btn" onclick="kbInput('5')">5</div>
    <div class="kb-btn" onclick="kbInput('6')">6</div>
    <div class="kb-btn" onclick="kbInput('7')">7</div>
    <div class="kb-btn" onclick="kbInput('8')">8</div>
    <div class="kb-btn" onclick="kbInput('9')">9</div>
    <div class="kb-btn" onclick="kbInput('.')">.</div>
    <div class="kb-btn" onclick="kbInput('0')">0</div>
    <div class="kb-btn action" onclick="kbDel()">←</div>
</div>

<script>
    const glueList = [
        { name: "17+18", a: "GLU-0018", r: 0.15, tags: ["ICO-HSR-042", "ICO-HSR-1902", "ZR3N", "ZR3N5", "ZR3N6"] },
        { name: "31+32", a: "GLU-0031", r: 0.1, tags: ["CS-30RX", "KT-20R-H.T", "KT-31R-H.T", "KT-31R-HTST", "M84QD-PVC-2M-N", "M84R-PVC-0.2M-N", "SM6T.2D", "ZS301", "ZS305", "ZS311", "ZS315"] },
        { name: "35+36", a: "GLU-0035/35-1", r: 0.5, tags: ["CS-15B", "CS-95", "CS-95A", "CS-9B", "GR04.202", "KIZ-E", "KT-09R-CH", "KT-15", "KT-16", "KT-43", "TDL-11", "TDL", "ZE255", "ZE235", "ZR2", "ZR25", "ZR2N", "ZR2N10", "ZR3", "ZR35", "KT-30R-LC", "SQ-03"] }
    ];

    let hIdx = 1;
    let activeInput = null;

    function showKb(el, e) {
        if(e) e.stopPropagation();
        document.querySelectorAll('input').forEach(i => i.classList.remove('active-focus'));
        activeInput = el;
        activeInput.classList.add('active-focus');
        document.getElementById('customKb').classList.add('show');
    }

    function hideKb() {
        if (activeInput) activeInput.classList.remove('active-focus');
        document.getElementById('customKb').classList.remove('show');
        activeInput = null;
    }

    function handleGlobalClick(e) {
        if (!e.target.closest('#customKb') && !e.target.tagName.includes('INPUT')) hideKb();
    }

    function kbInput(val) {
        if (!activeInput) return;
        if (val === '.' && activeInput.value.includes('.')) return;
        activeInput.value += val;
        triggerCalc();
    }

    function kbDel() {
        if (!activeInput) return;
        activeInput.value = activeInput.value.slice(0, -1);
        triggerCalc();
    }

    function triggerCalc() {
        if (activeInput.id === 'handInputA') calcHand();
        else calcMach();
    }

    function openHandMode(e) { e.stopPropagation(); document.getElementById('homePage').classList.add('hidden'); document.getElementById('handPage').classList.remove('hidden'); setHandType(1); }
    function openMachineMode(e) { e.stopPropagation(); document.getElementById('homePage').classList.add('hidden'); document.getElementById('machinePage').classList.remove('hidden'); resetMach(); }
    function goBack(e) { if(e) e.stopPropagation(); hideKb(); document.querySelectorAll('.app-card > div').forEach(d => d.classList.add('hidden')); document.getElementById('homePage').classList.remove('hidden'); }

    function setHandType(idx, e) {
        if(e) e.stopPropagation();
        hIdx = idx;
        document.querySelectorAll('.glue-opt').forEach((o, i) => o.classList.toggle('active', i === idx));
        document.getElementById('handLabelA').innerText = `主劑 (${glueList[idx].a}) (g)`;
        document.getElementById('handTags').innerHTML = glueList[idx].tags.map(t => `<span class="tag">${t}</span>`).join('');
        resetHand();
    }

    function calcHand() {
        const valA = parseFloat(document.getElementById('handInputA').value);
        if (isNaN(valA) || valA <= 0) { document.getElementById('handTotal').innerText = "--- g"; document.getElementById('handTotalRange').innerText = "--- ~ ---"; return; }
        const total = valA * (1 + glueList[hIdx].r);
        document.getElementById('handTotal').innerText = total.toFixed(2) + " g";
        document.getElementById('handTotalRange').innerText = `${(total * 0.99).toFixed(2)} ~ ${(total * 1.01).toFixed(2)}`;
    }

    function resetHand() { document.getElementById('handInputA').value = ""; calcHand(); }

    function calcMach() {
        const valA = parseFloat(document.getElementById('machInputA').value);
        const valB = parseFloat(document.getElementById('machInputB').value);
        const machBox = document.getElementById('machBox');
        if (!isNaN(valA) && !isNaN(valB) && valA > 0) {
            const ratio = valB / valA;
            document.getElementById('machRatio').innerText = ratio.toFixed(3);
            machBox.classList.remove('status-ok', 'status-warn', 'status-danger');
            if (ratio < 0.475 || ratio > 0.525) { machBox.classList.add('status-danger'); document.getElementById('machStatus').innerText = "✖ 異常"; }
            else if (ratio >= 0.485 && ratio <= 0.515) { machBox.classList.add('status-ok'); document.getElementById('machStatus').innerText = "✔ 合格"; }
            else { machBox.classList.add('status-warn'); document.getElementById('machStatus').innerText = "⚠ 示警"; }
        } else { document.getElementById('machRatio').innerText = "---"; document.getElementById('machStatus').innerText = "請輸入數值"; machBox.classList.remove('status-ok', 'status-warn', 'status-danger'); }
    }

    function resetMach() { document.getElementById('machInputA').value = ""; document.getElementById('machInputB').value = ""; calcMach(); }
</script>
</body>
</html>
