<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AB膠計算機</title>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --range-bg: #fffbe6; 
            --range-text: #d48806; --model-bg: #f8f9fa; --machine-bg: #e6f7ff;
            --machine-text: #0050b3; 
            --danger-bg: #fff1f0; --danger-border: #ffa39e; --danger-text: #cf1322;
            --warn-bg: #fffbe6; --warn-border: #ffe58f; --warn-text: #d48806;
            --ok-bg: #f6ffed; --ok-border: #b7eb8f; --ok-text: #389e0d;
        }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #eef2f5; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .app-card { background: white; width: 100%; max-width: 420px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box; }
        
        /* 首頁選單 */
        .home-menu { display: flex; flex-direction: column; gap: 20px; padding: 20px 0; }
        .nav-btn { 
            padding: 40px 20px; border: none; border-radius: 16px; font-size: 1.4rem; font-weight: bold; 
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .btn-hand-big { background: #fffbe6; color: #d48806; border: 2px solid #ffe58f; }
        .btn-machine-big { background: #e6f7ff; color: #0050b3; border: 2px solid #91d5ff; }

        .header { display: flex; align-items: center; margin-bottom: 20px; position: relative; }
        .btn-back { position: absolute; left: 0; background: #eee; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        h2 { flex: 1; text-align: center; color: var(--primary); font-size: 1.2rem; margin: 0; }

        .glue-selector { display: flex; gap: 6px; margin-bottom: 20px; }
        .glue-opt { 
            flex: 1; border: 2px solid #eee; padding: 10px 2px; border-radius: 12px; 
            background: white; text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: #888;
        }
        .glue-opt.active { border-color: var(--accent); background: #f0f7ff; color: var(--accent); }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 0.95rem; }
        input { 
            width: 100%; padding: 18px; border: 2px solid #ddd; border-radius: 14px; 
            font-size: 1.8rem; font-weight: bold; box-sizing: border-box; text-align: center; outline: none;
        }

        /* 結果顯示區塊 */
        .result-box { border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 15px; border: 2px solid transparent; transition: 0.3s; }
        .res-hand-total { background: #f8f9fa; border-color: #eee; }
        
        /* 打膠機狀態辨識樣式 */
        .res-machine { background: var(--machine-bg); border-color: #91d5ff; }
        .res-machine.status-danger { background: var(--danger-bg); border-color: var(--danger-border); }
        .res-machine.status-danger .res-value, .res-machine.status-danger .res-range-value { color: var(--danger-text) !important; }
        .res-machine.status-warn { background: var(--warn-bg); border-color: var(--warn-border); }
        .res-machine.status-warn .res-value, .res-machine.status-warn .res-range-value { color: var(--warn-text) !important; }
        .res-machine.status-ok { background: var(--ok-bg); border-color: var(--ok-border); }
        .res-machine.status-ok .res-value, .res-machine.status-ok .res-range-value { color: var(--ok-text) !important; }

        .res-label { font-size: 1rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        .res-value { font-size: 2.5rem; font-weight: 800; color: var(--primary); transition: 0.3s; }
        .res-sub-label { font-size: 0.85rem; color: #888; margin-top: 10px; }
        .res-range-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        .model-list-container { background: var(--model-bg); border-radius: 14px; padding: 15px; border: 1px solid #eee; font-size: 0.8rem; margin-top: 20px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag { background: #fff; border: 1px solid #ddd; padding: 3px 8px; border-radius: 6px; color: #444; }
        
        .hidden { display: none !important; }
        .btn-reset { margin-top: 20px; background: none; border: none; color: #bbb; cursor: pointer; text-decoration: underline; width: 100%; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="homePage" class="home-menu">
        <h2 style="margin-bottom: 15px;">請選擇作業模式</h2>
        <button class="nav-btn btn-hand-big" onclick="openHandMode()">🖐️ 手調模式</button>
        <button class="nav-btn btn-machine-big" onclick="openMachineMode()">⚙️ 打膠機校正</button>
    </div>

    <div id="handPage" class="hidden">
        <div class="header">
            <button class="btn-back" onclick="goBack()">⬅ 返回</button>
            <h2>手調秤重計算</h2>
        </div>
        <div class="glue-selector" id="handTypeSelector">
            <div class="glue-opt" onclick="setHandType(0)">17+18</div>
            <div class="glue-opt" onclick="setHandType(1)">31+32</div>
            <div class="glue-opt active" onclick="setHandType(2)">35+36</div>
        </div>
        <div class="input-group">
            <label id="handLabelA">主劑重量 (g)</label>
            <input type="number" id="handInputA" placeholder="輸入主劑重量" oninput="calcHand()" autofocus>
        </div>
        <div class="result-box res-hand-total">
            <div class="res-label">預估混合總重 (A+B)</div>
            <div id="handTotal" class="res-value">--- g</div>
            <div class="res-sub-label">合格總重範圍 (±1%)</div>
            <div id="handTotalRange" class="res-range-value" style="color: var(--range-text)">--- ~ ---</div>
        </div>
        <div class="model-list-container">
            <div style="font-weight:bold; color: #7f8c8d;">💡 適用型號：</div>
            <div id="handTags" class="tag-container"></div>
        </div>
        <button class="btn-reset" onclick="resetHand()">清空數據</button>
    </div>

    <div id="machinePage" class="hidden">
        <div class="header">
            <button class="btn-back" onclick="goBack()">⬅ 返回</button>
            <h2>打膠機比例校正</h2>
        </div>
        <div style="text-align:center; margin-bottom:20px; font-weight:bold; color:var(--accent);">GLU 35+36 (標準比值: 0.5)</div>
        <div class="input-group">
            <label>主劑 (GLU-0035/35-1) (g)</label>
            <input type="number" id="machInputA" placeholder="輸入主劑實測重" oninput="calcMach()">
        </div>
        <div class="input-group">
            <label>硬化劑 (GLU-0036) (g)</label>
            <input type="number" id="machInputB" placeholder="輸入硬化劑實測重" oninput="calcMach()">
        </div>
        <div id="machBox" class="result-box res-machine">
            <div class="res-label">實測重量比 (B ÷ A)</div>
            <div id="machRatio" class="res-value" style="color: var(--machine-text)">---</div>
            <div class="res-sub-label">0.475~0.525 (±5% 範圍)</div>
            <div id="machStatus" class="res-range-value" style="color: var(--machine-text)">請輸入數值</div>
        </div>
        <button class="btn-reset" onclick="resetMach()">清空數據</button>
    </div>
</div>

<script>
    const glueList = [
        { name: "17+18", a: "GLU-0018", r: 0.15, tags: ["ICO-HSR-042", "ICO-HSR-1902", "ZR3N", "ZR3N5", "ZR3N6"] },
        { name: "31+32", a: "GLU-0031", r: 0.1, tags: ["CS-30RX", "KT-20R-H.T", "KT-31R-H.T", "KT-31R-HTST", "M84QD-PVC-2M-N", "M84R-PVC-0.2M-N", "SM6T.2D", "ZS301", "ZS305", "ZS311", "ZS315"] },
        { name: "35+36", a: "GLU-0035/35-1", r: 0.5, tags: ["CS-15B", "CS-95", "CS-95A", "CS-9B", "GR04.202", "KIZ-E", "KT-09R-CH", "KT-15", "KT-16", "KT-43", "TDL-11", "TDL", "ZE255", "ZE235", "ZR2", "ZR25", "ZR2N", "ZR2N10", "ZR3", "ZR35", "KT-30R-LC", "SQ-03"] }
    ];

    let hIdx = 2;

    function openHandMode() {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('handPage').classList.remove('hidden');
        setHandType(2);
    }

    function openMachineMode() {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('machinePage').classList.remove('hidden');
        resetMach();
    }

    function goBack() {
        document.querySelectorAll('.app-card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('homePage').classList.remove('hidden');
    }

    function setHandType(idx) {
        hIdx = idx;
        const opts = document.querySelectorAll('#handTypeSelector .glue-opt');
        opts.forEach((o, i) => o.classList.toggle('active', i === idx));
        document.getElementById('handLabelA').innerText = `主劑重量 (${glueList[idx].a}) (g)`;
        document.getElementById('handTags').innerHTML = glueList[idx].tags.map(t => `<span class="tag">${t}</span>`).join('');
        resetHand();
    }

    function calcHand() {
        const valA = parseFloat(document.getElementById('handInputA').value);
        if (isNaN(valA) || valA <= 0) {
            document.getElementById('handTotal').innerText = "--- g";
            document.getElementById('handTotalRange').innerText = "--- ~ ---";
            return;
        }
        const total = valA * (1 + glueList[hIdx].r);
        document.getElementById('handTotal').innerText = total.toFixed(2) + " g";
        document.getElementById('handTotalRange').innerText = `${(total * 0.99).toFixed(2)} ~ ${(total * 1.01).toFixed(2)}`;
    }

    function resetHand() {
        document.getElementById('handInputA').value = "";
        document.getElementById('handTotal').innerText = "--- g";
        document.getElementById('handTotalRange').innerText = "--- ~ ---";
    }

    function calcMach() {
        const valA = parseFloat(document.getElementById('machInputA').value);
        const valB = parseFloat(document.getElementById('machInputB').value);
        const machBox = document.getElementById('machBox');
        const statusText = document.getElementById('machStatus');
        
        if (!isNaN(valA) && !isNaN(valB) && valA > 0) {
            const ratio = valB / valA;
            document.getElementById('machRatio').innerText = ratio.toFixed(3);
            
            machBox.classList.remove('status-ok', 'status-warn', 'status-danger');
            
            if (ratio < 0.475 || ratio > 0.525) {
                machBox.classList.add('status-danger');
                statusText.innerText = "✖ 異常 (偏差過大)";
            } else if (ratio >= 0.485 && ratio <= 0.515) {
                machBox.classList.add('status-ok');
                statusText.innerText = "✔ 合格 (精準度 ±3%)";
            } else {
                machBox.classList.add('status-warn');
                statusText.innerText = "⚠ 示警 (邊緣區間)";
            }
        } else {
            document.getElementById('machRatio').innerText = "---";
            statusText.innerText = "請輸入數值";
            machBox.classList.remove('status-ok', 'status-warn', 'status-danger');
        }
    }

    function resetMach() {
        document.getElementById('machInputA').value = "";
        document.getElementById('machInputB').value = "";
        document.getElementById('machRatio').innerText = "---";
        document.getElementById('machStatus').innerText = "請輸入數值";
        document.getElementById('machBox').classList.remove('status-ok', 'status-warn', 'status-danger');
    }
</script>
</body>
</html>
